name: ABI Integration Tests

on:
  pull_request:
    paths:
      - 'tests/**'
      - 'examples/**'
      - 'abi_scanner/**'
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get install -y gcc g++ binutils libabigail-tools
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run ABI integration tests
        run: pytest tests/test_abi_scenarios.py -v --strict-markers
