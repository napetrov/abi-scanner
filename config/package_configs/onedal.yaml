# config/package_configs/onedal.yaml
# Package structure configuration for oneDAL

library: onedal
primary_lib: libonedal.so.3

# All libraries to scan for ABI compatibility
libraries:
  - libonedal.so.3
  - libonedal_core.so.3
  - libonedal_dpc.so.3
  - libonedal_parameters.so.3
  - libonedal_parameters_dpc.so.3
  - libonedal_thread.so.3

sources:
  apt:
    base_url: https://apt.repos.intel.com/oneapi
    pkg_pattern: '^intel-oneapi-dal-2025\.\d+$'
    paths:
      lib: opt/intel/oneapi/dal/{version}/lib
      include: opt/intel/oneapi/dal/{version}/include

public_namespaces:
  - oneapi::dal::kmeans
  - oneapi::dal::knn
  - oneapi::dal::svm
  - oneapi::dal::pca
  - oneapi::dal::linear_regression
  - oneapi::dal::decision_forest
  - oneapi::dal::table
  - oneapi::dal::array

private_patterns:
  namespace:
    - .*::detail::.*
    - .*::backend::.*
    - .*::internal::.*
    - .*::v[0-9]+::.*
  symbol:
    - ^mkl_.*
    - ^_.*
    - ^tbb::detail::.*
    - ^daal::.*::internal::.*
    - ^__intel_.*
    - ^cdecl_.*

abicc:
  enabled: true
  timeout_sec: 300
  devel_pkg_pattern: '^intel-oneapi-dal-devel-2025\.\d+$'
  headers_subpath: 'opt/intel/oneapi/dal/{version}/include'
  skip_headers:
    - sycl.hpp
    - oneapi/dal/backend/interop/sycl.hpp
    - oneapi/dal/backend/interop/sycl_utils.hpp
