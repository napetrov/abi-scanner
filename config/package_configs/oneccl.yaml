# config/package_configs/oneccl.yaml
# Package configuration for Intel oneCCL (Collective Communications Library)

library: oneccl
primary_lib: libccl.so

# All libraries to scan for ABI compatibility
libraries:
  - libccl.so
  - libccl_openmp.so

sources:
  apt:
    base_url: https://apt.repos.intel.com/oneapi
    pkg_pattern: '^intel-oneapi-ccl-2021\.\d+$'
    paths:
      lib: opt/intel/oneapi/ccl/{version}/lib

public_namespaces:
  - ccl
  - oneapi::ccl

private_patterns:
  namespace:
    - ".*::detail::.*"
    - ".*::internal::.*"
  symbol:
    - "^__.*"
    - "^_GLOBAL__.*"

abicc:
  enabled: false  # skip for now (complex SYCL API or no devel pkg available)
