# config/package_configs/compiler.yaml
# Package configuration for Intel DPC++ Compiler Runtime (libsycl)

library: compiler
primary_lib: libsycl.so

# All libraries to scan for ABI compatibility
libraries:
  - libsycl.so.8.0.0
  - libsycl-preview.so.8.0.0
  - libsycl-jit.so
  - libpstloffload.so.1.0.0
  - libur_loader.so.0.12.0
  - libur_adapter_level_zero.so.0.12.0
  - libur_adapter_level_zero_v2.so.0.12.0
  - libur_adapter_opencl.so.0.12.0

sources:
  apt:
    base_url: https://apt.repos.intel.com/oneapi
    # Versioned package pattern: intel-oneapi-compiler-dpcpp-cpp-runtime-{major.minor}
    pkg_pattern: "^intel-oneapi-compiler-dpcpp-cpp-runtime-2025\\.\\d+$"
    paths:
      lib: opt/intel/oneapi/compiler/{major_minor}/lib

public_namespaces:
  - sycl
  - cl

private_patterns:
  namespace:
    - ".*::detail::.*"
    - ".*::backend::.*"
    - ".*::internal::.*"
  symbol:
    - "^_.*"
    - "^__.*"
    - "^mkl_.*"
